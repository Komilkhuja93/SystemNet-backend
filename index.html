<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komilxo'ja — AI Loyihachi</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#080b10;--surface:#0e1318;--surface2:#141a22;--border:#1e2a38;--accent:#00d4ff;--accent2:#7b5ea7;--accent3:#00ff88;--text:#e8edf5;--text-muted:#6b7f96;--text-dim:#3d5068;}
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow-x:hidden;cursor:none;}
  .cursor{width:8px;height:8px;background:var(--accent);border-radius:50%;position:fixed;pointer-events:none;z-index:9999;transition:transform 0.1s;mix-blend-mode:screen;}
  .cursor-ring{width:36px;height:36px;border:1.5px solid rgba(0,212,255,0.4);border-radius:50%;position:fixed;pointer-events:none;z-index:9998;transition:all 0.12s ease;}
  body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9997;opacity:0.4;}
  .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0;animation:drift 12s ease-in-out infinite alternate;}
  .orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(0,212,255,0.07),transparent);top:-100px;right:-100px;}
  .orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(123,94,167,0.08),transparent);bottom:20%;left:-80px;animation-delay:-4s;}
  .orb-3{width:250px;height:250px;background:radial-gradient(circle,rgba(0,255,136,0.05),transparent);top:50%;right:10%;animation-delay:-8s;}
  @keyframes drift{from{transform:translate(0,0) scale(1);}to{transform:translate(30px,-40px) scale(1.1);}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

  nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:18px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(8,11,16,0.75);backdrop-filter:blur(20px);border-bottom:1px solid rgba(30,42,56,0.5);gap:12px;}
  .nav-logo{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text);letter-spacing:-0.02em;flex-shrink:0;}
  .nav-logo span{color:var(--accent);}
  .nav-links{display:flex;gap:28px;list-style:none;}
  .nav-links a{color:var(--text-muted);text-decoration:none;font-size:0.82rem;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;transition:color 0.2s;}
  .nav-links a:hover{color:var(--accent);}
  .nav-right{display:flex;align-items:center;gap:10px;flex-shrink:0;}

  .lang-switcher{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:3px;border-radius:7px;}
  .lang-btn{display:flex;align-items:center;gap:4px;padding:5px 9px;border:none;background:transparent;cursor:none;border-radius:5px;font-family:'Space Grotesk',sans-serif;font-size:0.72rem;font-weight:600;color:var(--text-muted);transition:all 0.2s;line-height:1;}
  .lang-btn:hover{background:rgba(255,255,255,0.06);color:var(--text);}
  .lang-btn.active{background:var(--accent);color:#000;}
  .flag{font-size:0.95rem;}

  .nav-cta{background:transparent;border:1px solid var(--accent);color:var(--accent);padding:8px 18px;font-family:'Space Grotesk',sans-serif;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;cursor:none;transition:all 0.2s;text-decoration:none;white-space:nowrap;}
  .nav-cta:hover{background:var(--accent);color:var(--bg);}

  .hero{min-height:100vh;display:flex;align-items:center;padding:120px 40px 80px;position:relative;z-index:1;}
  .hero-inner{max-width:900px;margin:0 auto;width:100%;}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,212,255,0.06);border:1px solid rgba(0,212,255,0.2);padding:6px 16px;font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:32px;animation:fadeUp 0.6s ease both;}
  .badge-dot{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}
  .hero-title{font-family:'Syne',sans-serif;font-size:clamp(3rem,8vw,6rem);font-weight:800;line-height:0.95;letter-spacing:-0.04em;margin-bottom:28px;animation:fadeUp 0.6s 0.1s ease both;}
  .hero-title .line2{display:block;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
  .hero-desc{font-size:1.05rem;color:var(--text-muted);line-height:1.7;max-width:520px;margin-bottom:44px;animation:fadeUp 0.6s 0.2s ease both;}
  .hero-actions{display:flex;gap:16px;flex-wrap:wrap;animation:fadeUp 0.6s 0.3s ease both;}
  .btn-primary{display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,var(--accent),#0099cc);color:var(--bg);padding:14px 32px;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;text-decoration:none;cursor:none;transition:all 0.25s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 0 30px rgba(0,212,255,0.3);}
  .btn-secondary{display:inline-flex;align-items:center;gap:10px;border:1px solid var(--border);color:var(--text-muted);padding:14px 32px;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:600;text-decoration:none;cursor:none;transition:all 0.25s;background:rgba(14,19,24,0.5);}
  .btn-secondary:hover{border-color:var(--text-muted);color:var(--text);}
  .hero-stats{display:flex;gap:48px;margin-top:64px;padding-top:40px;border-top:1px solid var(--border);animation:fadeUp 0.6s 0.4s ease both;flex-wrap:wrap;}
  .stat-num{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;color:var(--text);letter-spacing:-0.04em;}
  .stat-num span{color:var(--accent);}
  .stat-label{font-size:0.78rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}

  section{padding:100px 40px;position:relative;z-index:1;}
  .section-tag{font-size:0.72rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--accent);margin-bottom:12px;}
  .section-title{font-family:'Syne',sans-serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:800;letter-spacing:-0.03em;margin-bottom:16px;}
  .section-sub{font-size:0.95rem;color:var(--text-muted);max-width:480px;line-height:1.7;margin-bottom:60px;}
  .container{max-width:1100px;margin:0 auto;}

  #xizmatlar{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
  .services-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);}
  .service-card{background:var(--surface2);padding:36px 32px;transition:background 0.25s;position:relative;overflow:hidden;}
  .service-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(180deg,var(--accent),transparent);opacity:0;transition:opacity 0.25s;}
  .service-card:hover{background:#161e29;}
  .service-card:hover::before{opacity:1;}
  .service-icon{font-size:1.8rem;margin-bottom:16px;display:block;}
  .service-name{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:8px;}
  .service-desc{font-size:0.83rem;color:var(--text-muted);line-height:1.6;margin-bottom:20px;}
  .service-price{font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--accent3);}

  .portfolio-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .portfolio-card{background:var(--surface);border:1px solid var(--border);padding:28px 24px;position:relative;transition:transform 0.2s,border-color 0.2s;}
  .portfolio-card:hover{transform:translateY(-4px);border-color:rgba(0,212,255,0.3);}
  .portfolio-num{font-family:'Syne',sans-serif;font-size:2.5rem;font-weight:800;color:var(--accent);opacity:0.2;position:absolute;top:16px;right:20px;}
  .portfolio-tag{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-bottom:10px;}
  .portfolio-title{font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;margin-bottom:6px;}
  .portfolio-sub{font-size:0.8rem;color:var(--text-muted);}

  #sharhlar{background:var(--surface);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
  .reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
  .review-card{background:var(--bg);border:1px solid var(--border);padding:28px 24px;position:relative;transition:border-color 0.2s;}
  .review-card:hover{border-color:rgba(123,94,167,0.4);}
  .review-stars{color:#f5c842;font-size:0.85rem;margin-bottom:14px;letter-spacing:2px;}
  .review-text{font-size:0.88rem;color:var(--text-muted);line-height:1.65;margin-bottom:20px;font-style:italic;}
  .review-author{font-size:0.82rem;font-weight:600;color:var(--text);}
  .review-date{font-size:0.72rem;color:var(--text-dim);margin-top:2px;}
  .review-quote{position:absolute;top:20px;right:20px;font-size:2.5rem;color:var(--accent2);opacity:0.12;font-family:Georgia,serif;}

  #buyurtma{background:var(--bg);}
  .order-wrapper{display:grid;grid-template-columns:1fr 1fr;gap:64px;align-items:start;}
  .order-feature{display:flex;align-items:flex-start;gap:14px;margin-bottom:20px;}
  .feature-icon{width:38px;height:38px;background:rgba(0,212,255,0.07);border:1px solid rgba(0,212,255,0.15);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0;}
  .feature-text strong{display:block;font-size:0.88rem;font-weight:600;margin-bottom:2px;}
  .feature-text span{font-size:0.78rem;color:var(--text-muted);}
  .form-group{margin-bottom:16px;}
  .form-group label{display:block;font-size:0.75rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
  .form-control{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:12px 16px;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;cursor:none;}
  .form-control:focus{border-color:var(--accent);}
  .form-control::placeholder{color:var(--text-dim);}
  textarea.form-control{resize:vertical;min-height:100px;}
  .form-submit{width:100%;background:linear-gradient(135deg,var(--accent),#0099cc);color:var(--bg);border:none;padding:14px;font-family:'Space Grotesk',sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;cursor:none;transition:all 0.25s;margin-top:8px;}
  .form-submit:hover{transform:translateY(-2px);box-shadow:0 0 24px rgba(0,212,255,0.3);}

  #boglanish{background:var(--surface);border-top:1px solid var(--border);}
  .contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
  .contact-card{background:var(--bg);border:1px solid var(--border);padding:24px 20px;text-decoration:none;display:block;transition:all 0.2s;position:relative;overflow:hidden;}
  .contact-card::after{content:'→';position:absolute;bottom:16px;right:20px;color:var(--accent);font-size:1rem;opacity:0;transform:translateX(-6px);transition:all 0.2s;}
  .contact-card:hover{border-color:var(--accent);background:rgba(0,212,255,0.03);}
  .contact-card:hover::after{opacity:1;transform:translateX(0);}
  .contact-type{font-size:0.68rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-dim);margin-bottom:8px;}
  .contact-icon{font-size:1.4rem;margin-bottom:10px;display:block;}
  .contact-value{font-size:0.9rem;font-weight:600;color:var(--text);}
  .contact-sub{font-size:0.75rem;color:var(--text-muted);margin-top:2px;}

  footer{padding:40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:1;}
  .footer-logo{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;}
  .footer-logo span{color:var(--accent);}
  .footer-copy{font-size:0.78rem;color:var(--text-dim);}
  .footer-status{display:flex;align-items:center;gap:8px;font-size:0.78rem;color:var(--accent3);font-weight:600;}
  .status-dot{width:6px;height:6px;background:var(--accent3);border-radius:50%;animation:blink 1.4s ease-in-out infinite;}

  .reveal{opacity:0;transform:translateY(24px);transition:all 0.6s ease;}
  .reveal.visible{opacity:1;transform:translateY(0);}

  @media(max-width:768px){
    nav{padding:14px 20px;}
    .nav-links{display:none;}
    .hero{padding:100px 20px 60px;}
    section{padding:70px 20px;}
    .portfolio-grid,.reviews-grid{grid-template-columns:1fr;}
    .order-wrapper{grid-template-columns:1fr;gap:40px;}
    footer{flex-direction:column;gap:16px;text-align:center;padding:30px 20px;}
    .hero-stats{gap:24px;}
  }
</style>
</head>

    <div class="order-wrapper">

        <p class="section-sub" style="margin-bottom:40px;" data-i18n="s4_sub"></p>

let lang = localStorage.getItem('kp_lang')||'uz';

function setLang(l){
  lang=l;
  localStorage.setItem('kp_lang',l);
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active',b.getAttribute('onclick').includes("'"+l+"'"));
  });
  apply();
}

function apply(){
  const t=T[lang];
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(t[k]!==undefined) el.textContent=t[k];
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{
    const k=el.getAttribute('data-i18n-ph');
    if(t[k]!==undefined) el.placeholder=t[k];
  });
  document.documentElement.lang=lang;
}

// CURSOR
const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx-4+'px';cur.style.top=my-4+'px';});
(function loop(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx-18+'px';ring.style.top=ry-18+'px';requestAnimationFrame(loop);})();
document.querySelectorAll('a,button,input,select,textarea').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.transform='scale(2.5)';ring.style.transform='scale(1.4)';ring.style.borderColor='rgba(0,212,255,0.7)';});
  el.addEventListener('mouseleave',()=>{cur.style.transform='scale(1)';ring.style.transform='scale(1)';ring.style.borderColor='rgba(0,212,255,0.4)';});
});

// SCROLL REVEAL
const obs=new IntersectionObserver(entries=>{
  entries.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add('visible'),i*80);});
},{threshold:0.08});
document.querySelectorAll('.reveal').forEach(r=>obs.observe(r));

// ORDER
function sendOrder(){
  const t=T[lang];
  const n=document.getElementById('inp-name').value.trim();
  const p=document.getElementById('inp-phone').value.trim();
  const s=document.getElementById('inp-service').value;
  const m=document.getElementById('inp-msg').value.trim();
  if(!n||!p||!s){alert(t.order_alert);return;}
  const txt=encodeURIComponent(t.order_msg.replace('{n}',n).replace('{p}',p).replace('{s}',s).replace('{m}',m||'—'));
  window.open('https://t.me/Komilkhuja?text='+txt,'_blank');
}

// COUNTER
document.querySelectorAll('.stat-num').forEach(el=>{
  const txt=el.textContent,num=parseInt(txt);
  if(isNaN(num))return;
  const suf=txt.replace(String(num),'');
  let c=0;const step=Math.max(1,Math.floor(num/40));
  const iv=setInterval(()=>{c=Math.min(c+step,num);el.innerHTML=c+'<span>'+suf+'</span>';if(c>=num)clearInterval(iv);},40);
});

setLang(lang);
</script>
